<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }} — KenyanCyber</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; font-family: 'Inter', sans-serif; color: #ededee; }
        .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
        
        header {
            position: sticky;
            top: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #00e88f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }
        .nav-links { display: flex; gap: 2rem; }
        .nav-links a { color: #a0a0b0; text-decoration: none; font-weight: 500; }
        .nav-links a:hover { color: #00d4ff; }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #00d4ff;
            text-decoration: none;
            margin-bottom: 2rem;
        }
        .post-title { font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem; }
        .post-meta {
            display: flex;
            gap: 1.5rem;
            color: #6e6e80;
            font-size: 0.875rem;
            font-family: 'JetBrains Mono', monospace;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }
        .post-content { font-size: 1.05rem; line-height: 1.7; color: #d0d0d8; }
        .post-content h2 { font-size: 1.75rem; margin: 2rem 0 1rem; color: #00d4ff; }
        .post-content h3 { font-size: 1.35rem; margin: 1.5rem 0 0.75rem; }
        .post-content p { margin: 1.25rem 0; }
        .post-content pre {
            background: #0d0d12;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        .post-content code {
            font-family: 'JetBrains Mono', monospace;
            background: #0d0d12;
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
        }
        .post-content blockquote {
            border-left: 3px solid #00d4ff;
            padding-left: 1.5rem;
            margin: 1.5rem 0;
            color: #a0a0b0;
        }
        footer {
            border-top: 1px solid rgba(0, 212, 255, 0.15);
            padding: 2rem 0;
            margin-top: 4rem;
            text-align: center;
            color: #6e6e80;
            font-size: 0.75rem;
        }
        @media (max-width: 768px) { .container { padding: 1rem; } }
    </style>
</head>
<body>
<header>
    <div class="nav">
        <a href="/" class="logo">KenyanCyber</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/projects">Projects</a>
            <a href="/notes">Notes</a>
            <a href="/contact">Contact</a>
        </div>
    </div>
</header>
<main>
    <div class="container">
        <a href="/notes" class="back-link"><i class="fas fa-arrow-left"></i> All notes</a>
        <h1 class="post-title">{{ post.title }}</h1>
        <div class="post-meta">
            <span><i class="far fa-calendar"></i> {{ post.date }}</span>
            <span><i class="far fa-clock"></i> {{ post.read_time }} min read</span>
            {% if post.tags %}
            <span><i class="fas fa-tags"></i> {{ post.tags }}</span>
            {% endif %}
        </div>
        <div class="post-content">
            {{ post.content_html|safe }}
        </div>
    </div>
</main>
<footer>
    <div class="container">
        <p>KenyanCyber — security that ships. <a href="/notes/rss.xml" style="color:#00d4ff;">RSS</a></p>
    </div>
</footer>
</body>
</html>
